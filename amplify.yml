version: 1
backend:
  phases:
    build:
      commands:
        - 'npm install -g bun'
        - 'bun install --frozen-lockfile'
        - 'bunx ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID'
frontend:
  phases:
    preBuild:
      commands:
    build:
      commands:
        - 'bunx --bun vite build'
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - 'node_modules/**/*'