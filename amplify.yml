version: 1
backend:
  phases:
    build:
      commands:
        - 'yarn install --immutable'
        - 'yarn ampx pipeline-deploy --branch $AWS_BRANCH --app-id $AWS_APP_ID'
frontend:
  phases:
    preBuild:
      commands:
    build:
      commands:
        - 'yarn run build'
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - 'node_modules/**/*'